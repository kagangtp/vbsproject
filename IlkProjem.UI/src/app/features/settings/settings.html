<div class="settings-wrapper">

    <!-- Header -->
    <div class="header-section">
        <div class="title-area">
            <h1>{{ 'SETTINGS_PAGE.TITLE' | translate }}</h1>
            <p>{{ 'SETTINGS_PAGE.SUBTITLE' | translate }}</p>
        </div>
    </div>

    <div class="settings-content">

        <!-- Theme Card -->
        <div class="settings-card">
            <div class="card-left">
                <div class="card-icon">🌙</div>
                <div class="card-info">
                    <h3>{{ 'SETTINGS_PAGE.THEME_TITLE' | translate }}</h3>
                    <p>{{ 'SETTINGS_PAGE.THEME_DESC' | translate }}</p>
                </div>
            </div>
            <div class="card-right">
                <label class="toggle-switch">
                    <input type="checkbox" [checked]="isDarkMode" (change)="toggleTheme()">
                    <span class="slider round"></span>
                </label>
                <span class="toggle-label">{{ 'SETTINGS_PAGE.DARK_MODE_LABEL' | translate }}</span>
            </div>
        </div>

    </div>
</div>
