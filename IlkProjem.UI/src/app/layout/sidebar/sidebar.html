<div class="sidebar-container">

  <div class="sidebar-header">
    <button class="toggle-btn" (click)="toggleSidebar()">
      <span class="icon">{{ isCollapsed() ? '▶' : '◀' }}</span>
    </button>
  </div>

  <div class="sidebar-nav">
    <a routerLink="/mainpage/dashboard" routerLinkActive="active" class="nav-link">
      <span class="icon">📊</span>
      <span class="nav-text">{{ 'SIDEBAR.DASHBOARD' | translate }}</span>
    </a>

    <a routerLink="/mainpage/customers" routerLinkActive="active" class="nav-link">
      <span class="icon">👥</span>
      <span class="nav-text">{{ 'SIDEBAR.CUSTOMERS' | translate }}</span>
    </a>

    <a routerLink="/mainpage/accounts" routerLinkActive="active" class="nav-link">
      <span class="icon">💳</span>
      <span class="nav-text">{{ 'SIDEBAR.ACCOUNTS' | translate }}</span>
    </a>

    <a routerLink="/mainpage/transactions" routerLinkActive="active" class="nav-link">
      <span class="icon">💰</span>
      <span class="nav-text">{{ 'SIDEBAR.TRANSACTIONS' | translate }}</span>
    </a>

    <a routerLink="/mainpage/send-email" routerLinkActive="active" class="nav-link">
      <span class="icon">✉️</span>
      <span class="nav-text">{{ 'SIDEBAR.EMAIL' | translate }}</span>
    </a>
  </div>

  <div class="sidebar-footer">
    <a routerLink="/mainpage/settings" routerLinkActive="active" class="nav-link">
      <span class="icon">⚙️</span>
      <span class="nav-text">{{ 'SIDEBAR.SETTINGS' | translate }}</span>
    </a>

    <button (click)="onLogout()" class="logout-button">
      <span class="icon">🚪</span>
      <span class="logout-text">{{ 'SIDEBAR.LOGOUT' | translate }}</span>
    </button>
  </div>
</div>
